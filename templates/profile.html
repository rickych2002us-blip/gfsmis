{% extends "base.html" %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white"><i class="bi bi-person-circle"></i> My Profile</div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('profile_update') }}">
                    <div class="row mb-3">
                        <div class="col"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-control" value="{{ current_user.first_name }}" required></div>
                        <div class="col"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control" value="{{ current_user.last_name }}" required></div>
                    </div>
                    <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ current_user.email }}"></div>
                    <div class="mb-3"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" value="{{ current_user.phone or '' }}"></div>
                    <hr>
                    <div class="mb-3"><label class="form-label">New Password (leave blank to keep current)</label><input type="password" name="password" class="form-control"></div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <input type="text" class="form-control" value="{{ current_user.role|title }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Station</label>
                        <input type="text" class="form-control" value="{{ current_user.station.name if current_user.station else 'N/A' }}" disabled>
                    </div>
                    <button type="submit" class="btn btn-danger w-100"><i class="bi bi-check-circle"></i> Update Profile</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
