{% extends "base.html" %}
{% block title %}Apply for Fire Certificate{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-danger text-white"><i class="bi bi-file-earmark-text"></i> Apply for Fire Certificate</div>
            <div class="card-body">
                <p class="text-muted">Fill out the form below to apply for a Fire Certificate for your business or property.</p>
                <form action="{{ url_for('public_certificate_apply') }}" method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Applicant Name <span class="text-danger">*</span></label>
                            <input type="text" name="applicant_name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="applicant_email" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input type="text" name="applicant_phone" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Business Name</label>
                            <input type="text" name="business_name" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Business Address</label>
                            <textarea name="business_address" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Property Type</label>
                            <select name="property_type" class="form-select">
                                <option value="">Select...</option>
                                <option value="Commercial">Commercial</option>
                                <option value="Residential">Residential</option>
                                <option value="Industrial">Industrial</option>
                                <option value="Public">Public</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-danger"><i class="bi bi-check"></i> Submit Application</button>
                            <a href="{{ url_for('public_portal') }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
