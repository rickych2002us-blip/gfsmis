{% extends "base.html" %}
{% block title %}Report a Hazard{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-danger text-white"><i class="bi bi-exclamation-triangle"></i> Report a Hazard</div>
            <div class="card-body">
                <p class="text-muted">Use this form to report a fire or safety hazard to the Guyana Fire Service.</p>
                <form action="{{ url_for('public_hazard') }}" method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Reporter Name</label>
                            <input type="text" name="reporter_name" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="reporter_email" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input type="text" name="reporter_phone" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Hazard Type</label>
                            <select name="hazard_type" class="form-select">
                                <option value="">Select...</option>
                                <option value="Fire Hazard">Fire Hazard</option>
                                <option value="Electrical">Electrical</option>
                                <option value="Gas Leak">Gas Leak</option>
                                <option value="Structural">Structural</option>
                                <option value="Chemical">Chemical</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Location <span class="text-danger">*</span></label>
                            <input type="text" name="location" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description <span class="text-danger">*</span></label>
                            <textarea name="description" class="form-control" rows="4" required></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-danger"><i class="bi bi-check"></i> Submit Report</button>
                            <a href="{{ url_for('public_portal') }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
