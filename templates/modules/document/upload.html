{% extends "base.html" %}
{% block title %}Upload Document{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-upload"></i> Upload Document</h2>
    <a href="{{ url_for('document_dashboard') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back</a>
</div>

<div class="card">
    <div class="card-header bg-danger text-white"><i class="bi bi-file-earmark"></i> Document Details</div>
    <div class="card-body">
        <form action="{{ url_for('document_upload') }}" method="POST" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Title <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select">
                        <option value="">Select...</option>
                        <option value="Reports">Reports</option>
                        <option value="Certificates">Certificates</option>
                        <option value="Policies">Policies</option>
                        <option value="Forms">Forms</option>
                        <option value="Correspondence">Correspondence</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Access Level</label>
                    <select name="access_level" class="form-select">
                        <option value="Internal">Internal</option>
                        <option value="Public">Public</option>
                        <option value="Restricted">Restricted</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">File <span class="text-danger">*</span></label>
                    <input type="file" name="file" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-danger"><i class="bi bi-upload"></i> Upload</button>
                    <a href="{{ url_for('document_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
