{% extends "base.html" %}
{% block title %}New Course{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-plus-circle"></i> Create Course</h2>
    <a href="{{ url_for('training_dashboard') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back</a>
</div>

<div class="card">
    <div class="card-header bg-danger text-white"><i class="bi bi-mortarboard"></i> Course Information</div>
    <div class="card-body">
        <form action="{{ url_for('training_course_new') }}" method="POST" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Course Code <span class="text-danger">*</span></label>
                    <input type="text" name="code" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Title <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Photo (passport size)</label>
                    <input type="file" name="photo" class="form-control" accept="image/*">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Instructor</label>
                    <select name="instructor_id" class="form-select">
                        <option value="">Select instructor...</option>
                        {% for i in instructors %}
                        <option value="{{ i.id }}">{{ i.first_name }} {{ i.last_name }} ({{ i.role }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Duration (hours)</label>
                    <input type="number" name="duration_hours" class="form-control" min="1">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Max Participants</label>
                    <input type="number" name="max_participants" class="form-control" min="1">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Start Date</label>
                    <input type="datetime-local" name="start_date" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">End Date</label>
                    <input type="datetime-local" name="end_date" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-danger"><i class="bi bi-check"></i> Save Course</button>
                    <a href="{{ url_for('training_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
